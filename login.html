<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In | WorkSphere</title>
    <link rel="stylesheet" href="signup.css">
    <link rel="stylesheet" href="navbar.css">

    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-clean-slate">

    <!-- Minimalistic Layout Navigation Header -->
    <nav class="auth-nav">
        <div class="logo">
            <h1>YouthConnect</h1>
        </div>
        <p class="auth-nav-text">New to YouthConnect? <a href="./signup.html">Sign Up</a></p>
    </nav>

    <!-- Log In Form Wrapper -->
    <main class="auth-container">
        <div class="auth-card">
            
            <div class="auth-header">
                <h2>Log in to YouthConnect</h2>
                <p>Enter your professional credentials to access your dashboard.</p>
            </div>

            <!-- Programmatic Login Form -->
            <form class="auth-form" action="#" method="POST">
                
                <div class="form-group">
                    <label for="email">Username or Email address</label>
                    <input type="email" id="email" required placeholder="you@company.com">
                </div>

                <div class="form-group">
                    <div class="form-row-dual" style="grid-template-columns: 1fr 1fr; align-items: center; gap: 0;">
                        <label for="password">Password</label>
                        <a href="#" class="form-group-checkbox" style="margin: 0; justify-content: flex-end; font-size: 0.85rem;">Forgot password?</a>
                    </div>
                    <div class="password-input-wrapper">
                        <input type="password" id="password" required placeholder="Enter password">
                        <i class="fa-solid fa-eye-slash toggle-password-visibility"></i>
                    </div>
                </div>

                <div class="form-group-checkbox">
                    <input type="checkbox" id="remember-me">
                    <label for="remember-me">Keep me logged in on this computer</label>
                </div>

                <button type="submit" class="btn-auth-submit">Log In to My Account</button>

                <!-- Social Sign-On Divider -->
                <div class="auth-divider">
                    <span>or continue with</span>
                </div>

                <!-- OAuth Social Providers Buttons -->
                <div class="oauth-buttons-row">
                    <button type="button" class="btn-oauth"><i class="fa-brands fa-google text-google"></i> Google</button>
                    <button type="button" class="btn-oauth"><i class="fa-brands fa-apple text-apple"></i> Apple</button>
                </div>

            </form>

        </div>
    </main>

    <!-- Global Layout System Footer -->
    <footer class="corporate-footer" style="padding-top: 3rem; margin-top: auto;">
        <div class="footer-legal-line" style="margin: 0; padding: 0;">
            <p>&copy; 2026 YouthConnect Systems Inc. All architectural rights reserved.</p>
        </div>
    </footer>
<script src="login.js"></script>
</body>
</html>
